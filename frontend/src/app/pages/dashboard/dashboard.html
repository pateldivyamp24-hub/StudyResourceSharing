<div class="dashboard-container">

  <h1>Welcome to StudyShare 📚</h1>
  <p>Your platform to upload and share study notes.</p>

  <div class="dashboard-cards">

    <div class="card">
      <h3>Upload Notes</h3>
      <p>Share your study materials with others.</p>
      <button routerLink="/upload">Upload</button>
    </div>

    <div class="card">
      <h3>Browse Notes</h3>
      <p>View and download available notes.</p>
      <button routerLink="/notes">View Notes</button>
    </div>

    <div class="card">
      <h3>Your Account</h3>
      <p>Manage your uploaded notes.</p>
      <button routerLink="/notes">Manage</button>
    </div>

  </div>

</div>
